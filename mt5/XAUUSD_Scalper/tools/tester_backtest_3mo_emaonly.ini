; MT5 Strategy Tester config for XAUUSD_Scalper_EA — 3-month real-tick backtest.
; Run via: terminal64.exe /config:<full-path-to-this-file>
; Terminal must NOT be running a live demo concurrently (Tester locks the EA).
[Tester]
Expert=XAUUSD_Scalper\XAUUSD_Scalper_EA
ExpertParameters=XAUUSD_Scalper\backtest_3mo_emaonly.set
Symbol=XAUUSD
Period=M1
Deposit=1000
Currency=USD
Leverage=1:500
; Spread=-1 → use real spread from each historical tick (bid/ask).
; Only meaningful with Model=0 (real ticks). Reverts to a fixed 8 pt if tick
; lacks ask data for a moment.
Spread=-1
ExecutionMode=0
; Model=0 = Every tick based on real ticks (requires broker tick history — MT5
; will fetch missing months from Doo Prime on run).
Model=0
FromDate=2026.02.01
ToDate=2026.04.30
ForwardMode=0
Optimization=0
OptimizationCriterion=0
Report=xauusd_scalper_3mo_emaonly_report
ReplaceReport=1
ShutdownTerminal=1
