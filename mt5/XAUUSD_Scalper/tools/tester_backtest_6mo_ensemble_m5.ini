Model=0
FromDate=2025.11.01
ToDate=2026.04.30
ForwardMode=0
Optimization=0
OptimizationCriterion=0
Report=xauusd_scalper_6mo_ensemble_m5_report
ReplaceReport=1
ShutdownTerminal=1
