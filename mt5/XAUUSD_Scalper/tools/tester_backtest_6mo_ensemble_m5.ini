; MT5 Strategy Tester — 6-month real-tick backtest, H1-filter config.
; Run via: terminal64.exe /config:<full-path-to-this-file>
; Terminal must NOT be running a live demo concurrently.
[Tester]
Expert=XAUUSD_Scalper\XAUUSD_Scalper_EA
ExpertParameters=XAUUSD_Scalper\backtest_3mo_ensemble_m5.set
Symbol=XAUUSD
Period=M5
Deposit=1000
Currency=USD
Leverage=1:500
Spread=-1
